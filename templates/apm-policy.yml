# Default APM policy for the Zava workshop bundle.
#
# This file lives at YOUR_ORG/.github/apm-policy.yml and is enforced by
# `apm install` and `apm audit` across all repos in the org.
#
# bootstrap.sh templates the YOUR_ORG placeholder to your actual org slug.
# If you're authoring by hand, replace YOUR_ORG below.
#
# Schema mirrors the live DevExpGbb policy
# (https://github.com/DevExpGbb/.github/blob/main/apm-policy.yml) with workshop
# additions (poisoned-tracing-skill explicit deny, zava-agent-config allow).
# Keep the structural fields (enforcement, cache, dependencies, mcp,
# compilation, manifest) in sync with the live policy as it evolves.

name: zava-workshop-org-policy
version: "1.2.0"
enforcement: block

cache:
  ttl: 3600

dependencies:
  allow:
    - "YOUR_ORG/**"
    - "DevExpGbb/zava-agent-config/**"
    - "microsoft/**"
    - "github/**"
  deny:
    # Block the supply chain demo poison fixture from accidental install.
    - "*/poisoned-tracing-skill"
  require_resolution: project-wins

mcp:
  allow:
    - "io.github.github/*"
    - "io.github.modelcontextprotocol/*"
  deny: []
  transport:
    allow: [stdio, http]
  self_defined: warn
  trust_transitive: false

compilation:
  target:
    allow: [vscode, claude, all]
  strategy:
    enforce: distributed
  source_attribution: true

manifest:
  required_fields: [version, description]
  scripts: allow
  content_types:
    allow: [instructions, skill, hybrid, prompts]
